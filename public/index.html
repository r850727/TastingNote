<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>品飲筆記</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <header>
    <h1 id="page-title">品飲筆記</h1>
    <p class="subtitle" id="page-subtitle">我的品飲收藏紀錄</p>
  </header>

  <div class="type-tabs" id="category-tabs">
    <!-- Categories will be injected here -->
  </div>

  <div id="stats-container">
    <div class="stats">
      <div class="stat"><div class="val" id="stat-total">0</div><div class="lbl">總數量</div></div>
      <div class="stat a"><div class="val" id="stat-sum">0</div><div class="lbl">總價</div></div>
      <div class="stat sp"><div class="val" id="stat-avg">0</div><div class="lbl">平均價格</div></div>
    </div>
    <div class="stats" id="stats-row-2" style="margin-top:-10px;">
      <div class="stat"><div class="val" id="stat-whisky">0</div><div class="lbl">威士忌</div></div>
      <div class="stat"><div class="val" id="stat-fruit">0</div><div class="lbl">果實酒</div></div>
      <div class="stat a"><div class="val" id="stat-sake">0</div><div class="lbl">清酒</div></div>
      <div class="stat"><div class="val" id="stat-spirits">0</div><div class="lbl">烈酒</div></div>
      <div class="stat b"><div class="val" id="stat-wine">0</div><div class="lbl">葡萄酒</div></div>
    </div>
  </div>

  <div class="legend" id="sake-legend" style="display: none;">
    <div class="legend-row"><span class="badge sp">S+</span><span class="legend-label">Saketime Top 10 (極致享受)</span></div>
    <div class="legend-row"><span class="badge s">S</span><span class="legend-label">Saketime Top 20 (強烈推薦)</span></div>
    <div class="legend-row"><span class="badge a">A</span><span class="legend-label">Saketime Top 50 (表現優秀)</span></div>
    <div class="legend-row"><span class="badge b">B</span><span class="legend-label">Saketime Top 100 (值得品嚐)</span></div>
    <div class="legend-row"><span class="badge c">C</span><span class="legend-label">知名銘柄</span></div>
    <div class="legend-row" style="margin-top: 8px; font-size: 0.8em; justify-content: flex-end;"><a href="https://www.saketime.jp/ranking/" target="_blank" style="color: var(--p1); text-decoration: none;">➔ 前往 Saketime 日本酒評價網</a></div>
  </div>

  <h2>篩選 & 排序</h2>
  <div class="controls-container">
    <div class="filters" id="filters">
      <!-- Dynamic filters will be injected here -->
    </div>

    <div class="sorts" id="sorts">
      <!-- Dynamic sorts will be injected here -->
    </div>
  </div>

  <div class="actions-bar">
    <p class="count-label" id="count-label">顯示 0 筆酒款</p>
    <button id="btn-add-wine" class="fbtn add-btn">+ 新增酒款工具</button>
  </div>

  <div class="wine-list" id="wine-list">
    <!-- Cards will be injected here -->
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="wine-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-body" id="modal-body">
        <!-- Content will be injected here -->
      </div>
    </div>
  </div>

  <!-- Add Wine Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal-content add-modal-content">
      <button class="modal-close" id="add-modal-close">×</button>
      <h2>新增酒款 JSON 產生器</h2>
      <div class="add-form">
        <label>名稱: <input type="text" id="add-name"></label>
        <label>分類: 
          <select id="add-cat">
            <option value="清酒">清酒</option>
            <option value="葡萄酒">葡萄酒</option>
            <option value="威士忌">威士忌</option>
            <option value="果實酒">果實酒</option>
            <option value="烈酒">烈酒</option>
            <option value="其他">其他</option>
          </select>
        </label>
        <div id="default-tag-container">
          <label>標籤: 
            <select id="add-tag"></select>
          </label>
        </div>
        <div id="sake-tag-container" style="display: none; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 5px; margin-bottom: 5px; background: rgba(0,0,0,0.1);">
          <div style="font-weight: bold; margin-bottom: 5px; color: var(--accent);">清酒專屬標籤</div>
          <label>法定等級 (必選):
            <select id="add-sake-grade">
              <option value="純米大吟釀">純米大吟釀</option>
              <option value="純米吟釀">純米吟釀</option>
              <option value="特別純米">特別純米</option>
              <option value="純米酒">純米酒</option>
              <option value="大吟釀">大吟釀</option>
              <option value="吟釀">吟釀</option>
              <option value="本釀造">本釀造</option>
              <option value="貴釀酒">貴釀酒</option>
              <option value="無特定名稱 / 非公開">無特定名稱 / 非公開</option>
            </select>
          </label>
          <label style="margin-top: 8px;">評級 (必選): 
            <select id="add-rank">
              <option value="S+">S+ (Top 10)</option>
              <option value="S">S (Top 20)</option>
              <option value="A">A (Top 50)</option>
              <option value="B">B (Top 100)</option>
              <option value="C">C (知名銘柄)</option>
            </select>
          </label>
          <label style="margin-top: 8px;">特殊工藝與狀態 (可選):
            <select id="add-sake-process">
              <option value="">(無)</option>
              <option value="生酒">生酒</option>
              <option value="氣泡清酒">氣泡清酒</option>
              <option value="生詰">生詰</option>
            </select>
          </label>
          <label style="margin-top: 8px;">釀造方式 (可選):
            <select id="add-sake-brew">
              <option value="">(無)</option>
              <option value="山廢">山廢</option>
              <option value="生酛">生酛</option>
            </select>
          </label>
        </div>
        <div id="whisky-tag-container" style="display: none; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 5px; margin-bottom: 5px; background: rgba(0,0,0,0.1);">
          <div style="font-weight: bold; margin-bottom: 5px; color: var(--accent);">威士忌專屬標籤</div>
          <label>種類 (必選):
            <select id="add-whisky-type">
              <option value="單一麥芽威士忌">單一麥芽威士忌</option>
              <option value="調和威士忌">調和威士忌</option>
            </select>
          </label>
          <label style="margin-top: 8px;">產區 (必選):
            <select id="add-whisky-region">
              <option value="蘇格蘭高地">蘇格蘭高地</option>
              <option value="蘇格蘭低地">蘇格蘭低地</option>
              <option value="蘇格蘭斯貝賽">蘇格蘭斯貝賽</option>
              <option value="蘇格蘭坎貝爾鎮">蘇格蘭坎貝爾鎮</option>
              <option value="蘇格蘭島嶼區">蘇格蘭島嶼區</option>
              <option value="蘇格蘭艾雷島">蘇格蘭艾雷島</option>
              <option value="日本">日本</option>
              <option value="台灣">台灣</option>
            </select>
          </label>
          <label style="margin-top: 8px;">桶型 (可多選):
            <div id="add-whisky-cask-buttons" style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px;">
              <button type="button" class="fbtn cask-btn" data-cask="雪莉桶">雪莉桶</button>
              <button type="button" class="fbtn cask-btn" data-cask="波本桶">波本桶</button>
              <button type="button" class="fbtn cask-btn" data-cask="波特桶">波特桶</button>
              <button type="button" class="fbtn cask-btn" data-cask="紅酒桶">紅酒桶</button>
              <button type="button" class="fbtn cask-btn" data-cask="水楢桶">水楢桶</button>
            </div>
          </label>
          <label style="margin-top: 8px;">泥煤強度 (可選):
            <select id="add-whisky-peat">
              <option value="">(無)</option>
              <option value="泥煤味">泥煤味</option>
              <option value="輕泥煤">輕泥煤</option>
              <option value="無泥煤">無泥煤</option>
            </select>
          </label>
        </div>
        <label>價格: 
          <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button type="button" class="fbtn active" id="btn-currency-jpy" style="flex: 0 0 auto;">日幣(¥)</button>
            <button type="button" class="fbtn" id="btn-currency-twd" style="flex: 0 0 auto;">台幣(NT$)</button>
            <input type="number" id="add-price" style="flex: 1;" placeholder="輸入數字">
          </div>
        </label>
        <label>圖片檔名: <input type="text" id="add-img" placeholder="例如: IMG_1234.jpg"></label>

        <button class="fbtn sp" style="width:100%; margin-top: 10px;" id="add-generate">產生並複製</button>
        <textarea id="add-result" readonly rows="5" style="width:100%; margin-top:10px; font-family:monospace; font-size:11px;" placeholder="產生的 JSON 會顯示在這裡"></textarea>
      </div>
    </div>
  </div>

  <!-- Cart / Favorites -->
  <div class="cart-bar hidden" id="cart-bar">
    <div class="cart-header" id="cart-header">
      <span class="cart-icon">❤️</span>
      <span class="cart-title">我的最愛 (<span id="cart-count">0</span>)</span>
      <span class="cart-toggle" id="cart-toggle">▲</span>
    </div>
    <div class="cart-body" id="cart-body">
      <div class="cart-items" id="cart-items"></div>
    </div>
  </div>

  <!-- Data and App Logic -->
  <script src="data.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
